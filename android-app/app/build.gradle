apply plugin: 'com.android.application'

android {
    compileSdkVersion 34
    namespace "com.lukasz.matrix"

    defaultConfig {
        applicationId "com.lukasz.matrix"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
